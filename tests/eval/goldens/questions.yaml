  - id: q18-dione-network-troubleshooting
    category: IT & Connectivity
    question: What network issues have been reported on MARAN DIONE and what are the troubleshooting steps?
    reference_answer: |
      MARAN DIONE (Angelicoussis class) has a SHI Smartship BIG System connectivity issue to cloud services. The troubleshooting steps from the engineer:

      1. Check LAN cable A75-1-1 between port No.0 of SMARTSHIP Firewall and VSAT rack — verify proper connection and LED blinking
      2. Have vessel IT engineer verify IP configuration: IP 172.16.1.138, Subnet 255.255.255.248, Gateway 172.16.1.137, DNS 172.16.1.137
      3. Confirm whitelist includes teamviewer.com and amazonaws.com (required for ship data transmission to AWS)
      4. If cable is connected and LEDs are normal, run nslookup diagnostics, disconnect/reconnect VSAT, and test domain resolution
    expected_facts:
      - MARAN DIONE has a SHI Smartship BIG System connectivity issue to cloud services.
      - Step 1 is to check LAN cable A75-1-1 between port No.0 of SMARTSHIP Firewall and VSAT rack for proper connection and LED blinking.
      - Step 2 is to verify IP configuration (IP 172.16.1.138, Subnet 255.255.255.248, Gateway 172.16.1.137, DNS 172.16.1.137).
      - Step 3 is to confirm whitelist includes teamviewer.com and amazonaws.com for AWS data transmission.
      - Step 4 is to run nslookup diagnostics, disconnect/reconnect VSAT, and test domain resolution if the cable and LEDs are normal.
    vessel_filter:
      vessel_class: Angelicoussis
    expected_chunk_ids: []
    notes: null

