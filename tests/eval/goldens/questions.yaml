questions:
  - id: q01-canopus-open-maintenance-issues
    category: Vessel Operations & Status
    question: What maintenance issues are currently open for MARAN CANOPUS?
    reference_answer: |
      CANOPUS has two key issues:

      1. **Main engine governor failure** — governor not regulating RPM correctly (RPM remains higher than setpoints, fuel index at 45%). A quotation for repair has been requested (CRM:0504838) and spare parts shipment is being coordinated.
      2. **SOx scrubber/EGCS internal inspection** — CANOPUS is one of multiple vessels (along with Arcturus, Cleo, Plato class) flagged for fleet-wide EGCS internal inspection covering leakage in bellows, structural integrity of steel plating, and deposits/contamination checks.
    expected_facts:
      - CANOPUS has a main engine governor failure.
      - The governor is not regulating RPM correctly, with RPM higher than setpoints and fuel index at 45%.
      - A repair quotation has been requested under CRM:0504838.
      - Spare parts shipment for the governor repair is being coordinated.
      - CANOPUS is flagged for fleet-wide EGCS/SOx scrubber internal inspection.
      - The EGCS inspection covers Arcturus, Canopus, Cleo, and Plato classes.
      - Inspection scope includes bellows leakage, structural integrity of steel plating, and deposits/contamination checks.
    vessel_filter:
      vessel_class: Canopus
    expected_chunk_ids: []
    notes: null

